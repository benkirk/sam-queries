# Alembic configuration — system_status database.
#
# This env is per-bind: it manages ONLY the `system_status` database.
# A future `migrations/sam/alembic.ini` will manage the legacy SAM
# database when that work begins. See migrations/README.md.
#
# The SQLAlchemy URL is intentionally NOT set here. env.py imports
# `connection_string` from `system_status.session`, which honors the
# STATUS_DB_* environment variables (driver, server, credentials, SSL).
# Tests and one-off invocations may override via ALEMBIC_SYSTEM_STATUS_URL.

[alembic]
# Path to migration scripts. `%(here)s` resolves to the directory
# containing this ini file, so the env works regardless of CWD.
script_location = %(here)s

# Template used by `alembic revision`.
file_template = %%(rev)s_%%(slug)s

# Timezone for timestamps in version files.
timezone = UTC

# Truncate slug to 40 chars in filenames.
truncate_slug_length = 40

# Don't move-on-merge revisions automatically.
revision_environment = false

# Source/version locations are relative to script_location.
sourceless = false

# Output encoding for `--sql` mode.
output_encoding = utf-8


# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
