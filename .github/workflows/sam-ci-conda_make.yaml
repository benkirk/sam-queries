name: Check Conda-based Installation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, staging]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  pytest:
    name: Run Test Suite (Docker)
    # Skip on [skip ci] / [ci skip] / [no ci] in commit message or PR title
    if: >-
      !contains(github.event.head_commit.message, '[skip ci]')
      && !contains(github.event.head_commit.message, '[ci skip]')
      && !contains(github.event.head_commit.message, '[no ci]')
      && !contains(github.event.pull_request.title, '[skip ci]')
      && !contains(github.event.pull_request.title, '[ci skip]')
      && !contains(github.event.pull_request.title, '[no ci]')
    runs-on: ubuntu-latest

    steps:
      - name: Install MySQL Client
        run: |
          sudo apt-get install -y mysql-client

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: ./conda-env/
          environment-file: conda-env.yaml

      - name: Build Conda Environment
        run: |
          make help
          cp .env.example .env
          pip install -e ".[test]"

      # currently needed for e.g. COPY --exclude syntax (1.19.0 / 2025-09-30)
      # https://docs.docker.com/build/buildkit/dockerfile-release-notes/?utm_source=chatgpt.com#1190
      - name: Install latest Docker
        uses: docker/setup-docker-action@v4
        with:
          docker-ce-version: latest   # or pin a version like "29.0.3"

      - name: Query Docker Environment
        run: |
          docker --version
          docker compose --version

      - name: Start Containers
        run: |
          make docker-up

      - name: Wait for MySQL
        run: scripts/ci/wait-for-mysql.sh
        env:
          COMPOSE_SERVICE: mysql

      # The conda-env CLI tools (sam-search, sam-status) run on the
      # HOST, not inside the docker stack — they reach the docker
      # mysql/system_status via the host port mapping (127.0.0.1:3306).
      # Set the SAM_DB_*/STATUS_DB_* env explicitly here. We used to
      # rely on .env.example having the LOCAL block uncommented, but
      # that template now defaults to all-commented (so a fresh
      # `install.sh`-generated .env doesn't leak 127.0.0.1 into
      # in-stack containers via compose's env_file pass-through).
      - name: Run sam-search CLI tool
        env:
          SAM_DB_SERVER: 127.0.0.1
          SAM_DB_USERNAME: root
          SAM_DB_PASSWORD: root
          SAM_DB_REQUIRE_SSL: "false"
        run: |
          sam-search --inactive-projects user benkirk --list-projects --verbose
          sam-search project SCSG0001 --verbose --list-users

      - name: Run sam-status CLI tool
        env:
          STATUS_DB_DRIVER: mysql
          STATUS_DB_SERVER: 127.0.0.1
          STATUS_DB_USERNAME: root
          STATUS_DB_PASSWORD: root
        run: |
          sam-status derecho
          sam-status casper
          sam-status jupyterhub

      # Note: the pytest suite does NOT run here. sam-ci-docker.yaml is
      # the canonical test job — it runs the full suite against the
      # mysql-test container. This workflow's job is to verify that the
      # conda/pip install path produces a working environment, which the
      # sam-search and sam-status smoke steps above already prove.

      - name: Cleanup
        if: always()
        run: |
          make docker-down
