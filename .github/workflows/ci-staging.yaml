name: Staging CI

on:
  pull_request:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified --results=verified,unknown

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: MegaLinter
        uses: oxsecurity/megalinter/flavors/cupcake@v8
        env:
          VALIDATE_ALL_CODEBASE: false
          DISABLE_ERRORS: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload MegaLinter reports
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: MegaLinter reports
          include-hidden-files: "true"
          path: |
            megalinter-reports
            mega-linter.log
          retention-days: 7

  terraform-check:
    name: Terraform Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Terraform fmt check
        run: terraform fmt -check -recursive infrastructure/staging/

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Install MySQL Client
        run: sudo apt-get install -y mysql-client

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install latest Docker
        uses: docker/setup-docker-action@v4
        with:
          docker-ce-version: latest

      - name: Verify MySQL backup file
        run: |
          BACKUP_FILE="containers/sam-sql-dev/backups/sam-obfuscated.sql.xz"
          if [ ! -f "${BACKUP_FILE}" ]; then
            echo "Backup file not found: ${BACKUP_FILE}"
            exit 1
          fi
          FILE_SIZE=$(stat -c%s "${BACKUP_FILE}" 2>/dev/null || stat -f%z "${BACKUP_FILE}" 2>/dev/null)
          if [ "${FILE_SIZE}" -lt 1000 ]; then
            echo "File is an LFS pointer, pulling..."
            git lfs pull
          fi

      - name: Build and start services
        run: |
          docker compose build
          # --profile test brings up the default stack PLUS mysql-test
          # (the isolated test DB container that SAM_TEST_DB_URL targets).
          docker compose --profile test up -d
          sleep 5

      - name: Wait for MySQL (main, port 3306)
        run: scripts/ci/wait-for-mysql.sh
        env:
          COMPOSE_SERVICE: mysql

      - name: Wait for MySQL (test, port 3307)
        run: scripts/ci/wait-for-mysql.sh
        env:
          MYSQL_PORT: "3307"
          COMPOSE_SERVICE: mysql-test

      - name: Wait for webapp
        run: |
          timeout 60 bash -c 'until docker compose exec -T webapp python -c "import sys; sys.exit(0)" 2>/dev/null; do sleep 2; done'

      - name: Run pytest (no coverage)
        # SAM_TEST_DB_URL uses the compose service hostname `mysql-test`
        # (reachable from inside the webapp container via the compose
        # network). The test suite's safety allowlist has this target
        # approved. `pytest` with no path arg picks up testpaths=tests
        # from the root pytest.ini; the -n auto and --no-cov defaults
        # come from pytest.ini addopts.
        run: |
          docker compose exec -T \
            -e SAM_TEST_DB_URL='mysql+pymysql://root:root@mysql-test:3306/sam' \
            webapp bash -c "cd /code && pytest"

      - name: Show container logs
        if: failure()
        run: docker compose logs --tail=200

      - name: Cleanup
        if: always()
        run: docker compose down -v
