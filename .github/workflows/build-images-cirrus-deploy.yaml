name: Publish Images and CIRRUS Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      images:
        description: |
          Space-separated list of images to build.
          Available: mysql webapp webdev collectors
          Leave empty to build defaults (mysql webapp).
        required: false
        default: ''

env:
  REGISTRY: ghcr.io

jobs:

  # -----------------------------------------------------------------------
  # setup: determine which images to build and emit a JSON matrix
  # -----------------------------------------------------------------------
  setup:
    name: Determine build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      webapp_built: ${{ steps.matrix.outputs.webapp_built }}

    steps:
      - name: Build matrix
        id: matrix
        run: |
          # ----------------------------------------------------------------
          # IMAGE DEFINITIONS — add new images here
          #
          # Format per image:
          #   name        short identifier used in image name and dispatch input
          #   dockerfile  path relative to repo root
          #   context     Docker build context path (relative to repo root)
          #   target      multi-stage target, or "" for single-stage
          #   default     "true" = built on every trigger, "false" = dispatch only
          # ----------------------------------------------------------------
          declare -A DOCKERFILE TARGET CONTEXT DEFAULT

          DOCKERFILE[mysql]="containers/sam-sql-dev/Dockerfile"
          CONTEXT[mysql]="containers/sam-sql-dev"
          TARGET[mysql]=""
          DEFAULT[mysql]="false"

          DOCKERFILE[webapp]="containers/webapp/Dockerfile"
          CONTEXT[webapp]="."
          TARGET[webapp]="production"
          DEFAULT[webapp]="true"

          DOCKERFILE[webdev]="containers/webapp/Dockerfile"
          CONTEXT[webdev]="."
          TARGET[webdev]="development"
          DEFAULT[webdev]="false"

          DOCKERFILE[collectors]="containers/collectors/Dockerfile"
          CONTEXT[collectors]="."
          TARGET[collectors]=""
          DEFAULT[collectors]="true"

          # ----------------------------------------------------------------
          # Determine which images to build
          # ----------------------------------------------------------------
          REQUESTED="${{ github.event.inputs.images }}"

          if [ -z "$REQUESTED" ]; then
            # No override: build all defaults
            IMAGES_TO_BUILD=""
            for img in "${!DEFAULT[@]}"; do
              if [ "${DEFAULT[$img]}" = "true" ]; then
                IMAGES_TO_BUILD="$IMAGES_TO_BUILD $img"
              fi
            done
          else
            IMAGES_TO_BUILD="$REQUESTED"
          fi

          # ----------------------------------------------------------------
          # Emit JSON matrix
          # ----------------------------------------------------------------
          MATRIX='{"include":['
          FIRST=true

          for img in $IMAGES_TO_BUILD; do
            if [ -z "${DOCKERFILE[$img]+x}" ]; then
              echo "WARNING: Unknown image '$img' — skipping" >&2
              continue
            fi

            [ "$FIRST" = "true" ] || MATRIX+=','
            FIRST=false

            MATRIX+="{\"name\":\"${img}\","
            MATRIX+="\"dockerfile\":\"${DOCKERFILE[$img]}\","
            MATRIX+="\"context\":\"${CONTEXT[$img]}\","
            MATRIX+="\"target\":\"${TARGET[$img]}\"}"
          done

          MATRIX+=']}'
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Building: $IMAGES_TO_BUILD"
          echo "Matrix: $MATRIX"

          # Indicate whether webapp is included (used by update-helm job)
          if echo "$IMAGES_TO_BUILD" | grep -qw "webapp"; then
            echo "webapp_built=true" >> "$GITHUB_OUTPUT"
          else
            echo "webapp_built=false" >> "$GITHUB_OUTPUT"
          fi

  # -----------------------------------------------------------------------
  # build: multi-platform image build and push (one job per matrix entry)
  # -----------------------------------------------------------------------
  build:
    name: Build ${{ matrix.name }}
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.name }}
          tags: |
            # branch name (e.g. main)
            type=ref,event=branch
            # tag name (e.g. v1.2.3)
            type=ref,event=tag
            # semver components from tag (v1.2.3 → 1.2.3, 1.2, 1)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # short commit SHA always
            type=sha,prefix=sha-
            # 'latest' only on the main branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Compute build date
        id: build_date
        run: echo "value=$(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ steps.build_date.outputs.value }}

      - name: Collect image facts
        run: |
          set -euo pipefail
          PRIMARY_TAG=$(printf '%s\n' "${{ steps.meta.outputs.tags }}" | head -n1)
          DIGEST="${{ steps.build.outputs.digest }}"
          REPO="${PRIMARY_TAG%:*}"

          # Top-level OCI image index — one entry per platform plus an
          # 'unknown/unknown' attestation manifest we filter out.
          INDEX=$(docker buildx imagetools inspect --raw "${PRIMARY_TAG}")

          SIZES_JSON='{}'
          while IFS=$'\t' read -r child_digest os arch variant; do
            [ -z "$child_digest" ] && continue
            [ "$os" = "unknown" ] && continue
            child_manifest=$(docker buildx imagetools inspect --raw "${REPO}@${child_digest}")
            size=$(printf '%s' "$child_manifest" \
              | jq '(.config.size // 0) + ([.layers[]?.size] | add // 0)')
            platform="${os}/${arch}"
            [ -n "$variant" ] && platform="${platform}/${variant}"
            SIZES_JSON=$(printf '%s' "$SIZES_JSON" \
              | jq --arg p "$platform" --argjson s "$size" '. + {($p): $s}')
          done < <(printf '%s' "$INDEX" \
            | jq -r '.manifests[] | [.digest, .platform.os // "", .platform.architecture // "", .platform.variant // ""] | @tsv')

          ALL_TAGS_JSON=$(printf '%s\n' "${{ steps.meta.outputs.tags }}" | jq -R . | jq -s .)

          jq -n \
            --arg name "${{ matrix.name }}" \
            --arg primary_tag "$PRIMARY_TAG" \
            --argjson all_tags "$ALL_TAGS_JSON" \
            --arg digest "$DIGEST" \
            --argjson sizes "$SIZES_JSON" \
            --arg build_date "${{ steps.build_date.outputs.value }}" \
            '{name: $name, primary_tag: $primary_tag, all_tags: $all_tags, digest: $digest, sizes: $sizes, build_date: $build_date}' \
            > "image-info-${{ matrix.name }}.json"

          cat "image-info-${{ matrix.name }}.json"

      - name: Upload image facts
        uses: actions/upload-artifact@v4
        with:
          name: image-info-${{ matrix.name }}
          path: image-info-${{ matrix.name }}.json
          if-no-files-found: error
          retention-days: 30

  # -----------------------------------------------------------------------
  # summary: aggregate per-image facts into one workflow-run summary page
  # -----------------------------------------------------------------------
  summary:
    name: Build summary
    needs: [setup, build]
    if: always() && needs.setup.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download image facts
        uses: actions/download-artifact@v4
        with:
          pattern: image-info-*
          path: image-info/
          merge-multiple: true

      - name: Render summary
        run: |
          python3 .github/scripts/render_build_summary.py image-info/ \
            >> "$GITHUB_STEP_SUMMARY"

  # -----------------------------------------------------------------------
  # update-helm: pin helm/values.yaml to the built SHA tag, push to cirrus
  # -----------------------------------------------------------------------
  update-helm:
    name: Pin Helm image tag → cirrus
    needs: [setup, build]
    if: needs.setup.outputs.webapp_built == 'true'
    runs-on: ubuntu-latest

    # Serialize cirrus force-pushes so two concurrent deploys can't race the
    # branch (it is reset + force-pushed on every run).
    concurrency:
      group: cirrus-branch-push
      cancel-in-progress: false

    permissions:
      contents: read   # push to cirrus uses the App token below, not GITHUB_TOKEN

    steps:
      # The cirrus branch is locked by a repository ruleset whose only bypass
      # actor is this GitHub App, so the push below MUST authenticate as the App.
      - name: Mint GitHub App token (cirrus deploy identity)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CIRRUS_DEPLOY_APP_ID }}
          private-key: ${{ secrets.CIRRUS_DEPLOY_APP_PRIVATE_KEY }}

      - name: Checkout triggering ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 1
          # persist-credentials (default true) wires this App token into the git
          # remote so the force-push step below pushes as the App.
          token: ${{ steps.app-token.outputs.token }}

      - name: Patch helm/values.yaml with SHA image tag
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          NEW_IMAGE="ghcr.io/${{ github.repository }}/webapp:sha-${SHORT_SHA}"
          echo "Pinning webapp image → ${NEW_IMAGE}"
          sed -i \
            "s|image: ghcr.io/${{ github.repository }}/webapp:.*|image: ${NEW_IMAGE}|" \
            helm/values.yaml
          grep "image:" helm/values.yaml   # sanity-check

      - name: Commit and force-push cirrus branch
        run: |
          git config user.name  "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          git checkout -B cirrus
          git add helm/values.yaml
          git commit -m "ci: pin webapp image to sha-${GITHUB_SHA:0:7} ($(date -u '+%Y-%m-%d %H:%M UTC')) [skip ci]"
          git push origin cirrus --force
