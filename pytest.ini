# Project-wide pytest configuration.
#
# The SAM test suite refuses to run against anything other than the dedicated
# `mysql-test` container (host port 3307). See `tests/conftest.py` for the
# allowlist guard that enforces this.
#
# Usage:
#   docker compose --profile test up -d mysql-test
#   export SAM_TEST_DB_URL='mysql+pymysql://root:root@127.0.0.1:3307/sam'
#   pytest                            # full suite, parallel
#   pytest tests/unit/test_smoke.py   # single file

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# -n auto    : parallel via pytest-xdist (auto-detects cores)
# --maxfail  : bail after 5 failures to keep CI runs short
#
# Coverage is opt-in: pytest-cov only activates when --cov=PATH is passed
# explicitly. Plain `pytest` therefore runs with no coverage overhead
# (fast inner loop), and `pytest --cov=src --cov-fail-under=60` engages
# both collection and the gate.
#
# Do NOT add `--no-cov` here. pytest-cov treats it as a hard kill switch
# that wins over a command-line `--cov=src`, which silently disables
# coverage AND neutralizes --cov-fail-under in CI. See the CovDisabledWarning
# in the pytest-cov source for the exact semantics.
addopts =
    -v
    --strict-markers
    --tb=short
    --maxfail=5
    -n auto

markers =
    unit:        factory-driven unit tests, no snapshot dependency
    integration: snapshot-dependent structural or routing tests
    smoke:       fast infrastructure smoke tests
    webapp:      Flask test-client routing tests
    perf:        query-count / latency regression tests (slow, gated)

# pytest-timeout plugin — global per-test ceiling
timeout = 300
