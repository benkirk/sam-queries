# Configuration for bootstrap_clone.py

remote:
  #host: your.remote.db.server
  port: 3306
  #user: readonly_user
  #password: your_password
  database: sam

local:
  host: localhost
  port: 3306
  user: root
  password: root
  database: sam
  docker_container: samuel-mysql    # must match the running docker MySQL container name

settings:
  # --- Sampling behavior ---
  size_threshold_mb: 250           # tables smaller than this (MB) are copied fully
  row_limit: 10000                 # initial sample size for large tables
  max_refill_multiplier: 8         # will retry with up to 8x row_limit if empty

  # --- Column preference for ordering ---
  prefer_column: created_at        # preferred ordering column for sampling recent rows

  # --- Post-processing ---
  prune_orphans: true              # whether to run cleanup_orphans.py automatically

  # --- Performance tweaks ---
  # Set to true to temporarily disable foreign key checks during loads (faster, riskier)
  disable_fk_checks: false         # (currently informational, not used by script)

  # --- Optional: logging / debug ---
  verbose: true                    # print detailed progress (default: true)

  # --- Per-table subsetting strategies ---
  # Applied BEFORE the size-threshold logic. Patterns are tried in document
  # order; first match wins (fnmatch glob syntax, case-sensitive).
  #
  # Modes:
  #   empty   -> schema only, zero rows (WHERE 1=0)
  #   recent  -> rows where <column> >= CURDATE() - <days>
  #
  # Tables with no matching strategy fall through to size-based sampling.
  table_strategies:
    # Individual-event tables: already rolled up into *_charge_summary,
    # not needed for local dev. Leaving them empty avoids cloning real
    # usernames/hostnames that would otherwise need anonymization.
    - pattern: "*_job"               # comp_job
      mode: empty
    - pattern: "*_activity"          # comp/hpc/dav/disk/archive_activity
      mode: empty
    - pattern: "hpc_charge"
      mode: empty
    - pattern: "dav_charge"
      mode: empty
    - pattern: "archive_charge"
      mode: empty

    # Specific overrides first
    - pattern: "comp_charge_summary"
      mode: recent
      column: activity_date
      days: 730

   # Summary tables: keep ~2 years so balance math and YoY comparisons work.
    - pattern: "*_charge_summary"
      mode: recent
      column: activity_date
      days: 400

# --- Anonymization settings ---
anonymization:
  # Usernames to preserve (for testing/development purposes)
  # These users will NOT be anonymized and will keep their real data
  preserve_usernames:
    - benkirk
    - csgteam
    - andersnb
    # Add more usernames as needed for testing

  # Whether to preserve related data for preserved users
  preserve_emails: true            # keep real emails for preserved users
  preserve_phones: true            # keep real phone numbers for preserved users

  # Random seed for deterministic anonymization
  seed: 42                         # change this to get different anonymized data
