apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.webapp.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.webapp.name }}
    group: {{ .Values.webapp.group }}
spec:
  replicas: {{ .Values.replicaCount }}
  {{- if .Values.rollout }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.rollout.maxUnavailable }}
      maxSurge: {{ .Values.rollout.maxSurge }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ .Values.webapp.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.webapp.name }}
    spec:
      # The app never talks to the k8s API; don't hand a code-exec foothold
      # the default ServiceAccount token.
      automountServiceAccountToken: false
      {{- with .Values.webapp.securityContext }}
      {{- with .pod }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- if and .Values.topologySpread .Values.topologySpread.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ .Values.topologySpread.maxSkew }}
          topologyKey: {{ .Values.topologySpread.topologyKey }}
          whenUnsatisfiable: {{ .Values.topologySpread.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              app: {{ .Values.webapp.name }}
      {{- end }}
      containers:
      - name: {{ .Values.webapp.name }}
        image: {{ .Values.webapp.container.image }}
        imagePullPolicy: IfNotPresent
        {{- with .Values.webapp.securityContext }}
        {{- with .container }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- end }}
        {{- if or .Values.webapp.env (or .Values.webapp.dbCredentials.enabled (or .Values.webapp.samDbCredentials.enabled (or .Values.webapp.jupyterhubCredentials.enabled (or .Values.webapp.oidcCredentials.enabled .Values.webapp.jhDbCredentials.enabled)))) }}
        env:
          {{- range $key, $value := .Values.webapp.env }}
          - name: {{ $key }}
            value: {{ $value | quote }}
          {{- end }}
          # Gunicorn workers sized from the cgroup CPU limit (2·cpu + 1).
          # multiprocessing.cpu_count() inside the pod returns the node's CPU
          # count, not the cgroup quota — without this, gunicorn_config.py would
          # spawn ~129 workers on a 64-core node and OOM the pod.
          - name: GUNICORN_WORKERS
            value: {{ mul (.Values.webapp.container.limits.cpu | int) 2 | add 1 | quote }}
          {{- if .Values.cache.enabled }}
          # Centralized Redis: DB 0 for cache, DB 1 for rate-limit counters.
          - name: CACHE_REDIS_URL
            value: "redis://{{ .Values.cache.name }}.{{ .Release.Namespace }}.svc:{{ .Values.cache.port }}/0"
          - name: RATELIMIT_STORAGE_URI
            value: "redis://{{ .Values.cache.name }}.{{ .Release.Namespace }}.svc:{{ .Values.cache.port }}/1"
          {{- end }}
          {{- if .Values.webapp.dbCredentials.enabled }}
          - name: STATUS_DB_USERNAME
            valueFrom:
              secretKeyRef:
                name: {{ .Values.webapp.name }}-db-credentials
                key: username
          - name: STATUS_DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ .Values.webapp.name }}-db-credentials
                key: password
          {{- end }}
          {{- if .Values.webapp.samDbCredentials.enabled }}
          - name: SAM_DB_USERNAME
            valueFrom:
              secretKeyRef:
                name: {{ .Values.webapp.name }}-sam-db-credentials
                key: username
          - name: SAM_DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ .Values.webapp.name }}-sam-db-credentials
                key: password
          {{- end }}
          {{- if .Values.webapp.jhDbCredentials.enabled }}
          - name: JOB_HISTORY_PG_USER
            valueFrom:
              secretKeyRef:
                name: {{ .Values.webapp.name }}-jh-db-credentials
                key: username
          - name: JOB_HISTORY_PG_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ .Values.webapp.name }}-jh-db-credentials
                key: password
          {{- end }}
          {{- if .Values.webapp.jupyterhubCredentials.enabled }}
          - name: JUPYTERHUB_API_TOKEN
            valueFrom:
              secretKeyRef:
                name: {{ .Values.webapp.name }}-jh-credentials
                key: token
          {{- end }}
          {{- if .Values.webapp.oidcCredentials.enabled }}
          - name: OIDC_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: {{ .Values.webapp.name }}-oidc-credentials
                key: client_id
          - name: OIDC_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: {{ .Values.webapp.name }}-oidc-credentials
                key: client_secret
          - name: OIDC_ISSUER
            valueFrom:
              secretKeyRef:
                name: {{ .Values.webapp.name }}-oidc-credentials
                key: issuer
          - name: FLASK_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: {{ .Values.webapp.name }}-oidc-credentials
                key: flask_secret_key
          {{- end }}
        {{- end }}
        resources:
          requests:
            memory: {{ .Values.webapp.container.requests.memory }}
            cpu: {{ .Values.webapp.container.requests.cpu }}
          limits:
            memory: {{ .Values.webapp.container.limits.memory }}
            cpu: {{ .Values.webapp.container.limits.cpu }}
        ports:
        - containerPort: {{ .Values.webapp.container.port }}
        {{- if and .Values.webapp.probes .Values.webapp.probes.enabled }}
        # Startup gate: give a slow gunicorn boot time before liveness kicks
        # in. Until this passes, liveness/readiness are not evaluated.
        startupProbe:
          httpGet:
            path: {{ .Values.webapp.probes.path }}/live
            port: {{ .Values.webapp.container.port }}
          periodSeconds: {{ .Values.webapp.probes.startup.periodSeconds }}
          failureThreshold: {{ .Values.webapp.probes.startup.failureThreshold }}
        # Liveness: /live makes no DB call, so only a wedged process restarts.
        livenessProbe:
          httpGet:
            path: {{ .Values.webapp.probes.path }}/live
            port: {{ .Values.webapp.container.port }}
          periodSeconds: {{ .Values.webapp.probes.liveness.periodSeconds }}
          timeoutSeconds: {{ .Values.webapp.probes.liveness.timeoutSeconds }}
          failureThreshold: {{ .Values.webapp.probes.liveness.failureThreshold }}
        # Readiness: /ready pings the DBs; a 503 pulls the pod from the
        # Service and stalls a rollout instead of promoting a broken build.
        readinessProbe:
          httpGet:
            path: {{ .Values.webapp.probes.path }}/ready
            port: {{ .Values.webapp.container.port }}
          periodSeconds: {{ .Values.webapp.probes.readiness.periodSeconds }}
          timeoutSeconds: {{ .Values.webapp.probes.readiness.timeoutSeconds }}
          failureThreshold: {{ .Values.webapp.probes.readiness.failureThreshold }}
        {{- end }}