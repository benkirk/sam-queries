{{- if .Values.cache.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.cache.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    group: {{ .Values.webapp.group }}
spec:
  ports:
  - port: {{ .Values.cache.port }}
    targetPort: {{ .Values.cache.port }}
  selector:
    app: {{ .Values.cache.name }}
{{- end }}
