replicaCount: 2                           # Number of identical pods to run

# Rollout safety: never drop below replicaCount Ready pods during an update.
# maxUnavailable:0 + maxSurge:1 means "bring up one new pod, wait for it to
# pass the readiness probe, THEN retire an old one." Without the readiness
# probe (webapp.probes) this gating is meaningless — a pod is "Ready" the
# instant its process starts, so a broken build would still complete the
# rollout while serving errors.
rollout:
  maxUnavailable: 0
  maxSurge: 1

# Old (scaled-to-0) ReplicaSets retained per Deployment for rollback history.
# k8s defaults to 10, which clutters the ArgoCD view; GitOps rollback is via
# git revert + resync, so keep a small number. Applies to webapp AND redis.
revisionHistoryLimit: 3

# PodDisruptionBudget — keep >=minAvailable webapp pods serving during
# VOLUNTARY disruptions (node drains, cluster maintenance). Without this, a
# single node drain can evict both replicas at once and take the app down.
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Spread replicas across nodes so one node failure can't take out all of them.
# whenUnsatisfiable: ScheduleAnyway keeps scheduling best-effort on a lopsided
# cluster rather than leaving a pod Pending (which is what wedged us at 1/2).
topologySpread:
  enabled: true
  maxSkew: 1
  topologyKey: kubernetes.io/hostname
  whenUnsatisfiable: ScheduleAnyway

# Centralized Redis backend used by:
#   - Flask-Caching chart cache (CACHE_REDIS_URL → DB 0)
#   - Flask-Limiter rate-limit counters (RATELIMIT_STORAGE_URI → DB 1)
# Single replica, no persistence, no HA. Eviction = allkeys-lru.
# See docs/plans/REDIS.md.
cache:
  enabled: true
  name: samuel-redis
  image: docker.io/library/redis:7-alpine
  port: 6379
  maxmemoryMB: 64
  requests:
    memory: 32Mi
    cpu: 50m
  limits:
    memory: 96Mi
    cpu: 500m
  # Pod/container security hardening. redis:7-alpine ships uid=999(redis)
  # gid=1000(redis) (verified: `docker run --rm redis:7-alpine id redis`);
  # its entrypoint execs redis-server directly when started non-root, and
  # `--save ""` means no /data writes.
  securityContext:
    pod:
      runAsNonRoot: true
      runAsUser: 999
      runAsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    container:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]

webapp:
  name: samuel                            # Name for k8s objects
  group: samuel                           # Group label for related resources
  path: /                                 # URL path suffix
  tls:
    fqdn: samuel.k8s.ucar.edu             # Must be unique and end in .k8s.ucar.edu
    secretName: incommon-cert-samuel      # Unique TLS secret name for your FQDN
  ingress:
    visibility: external                  # internal or external
    # Edge rate limiting (nginx ingress controller), IN FRONT of the app-layer
    # Flask-Limiter. IMPORTANT: on the nwc1 nginx-external controller every
    # client currently presents as 127.0.0.1 — X-Forwarded-For is not
    # propagated to the controller (see proxyFixForwardedHops) — so limit-rps /
    # limit-connections act as ONE GLOBAL bucket, NOT per-client. Values below
    # are a deliberately HIGH blunt flood-backstop that legitimate aggregate
    # traffic should not reach; revisit to proper per-IP values once the
    # controller forwards real client IPs. Set rps: 0 to disable all three.
    rateLimit:
      rps: 100                            # global req/sec backstop (limit-rps)
      connections: 200                    # global concurrent connections (limit-connections)
      burstMultiplier: 5                  # short-burst allowance = rps * this (limit-burst-multiplier)
  # Trusted proxy hops for ProxyFix (X-Forwarded-For depth). Sets PROXYFIX_X_FOR.
  # MUST equal the exact number of proxies that append to X-Forwarded-For, or a
  # client can spoof its IP. Start at 1 (safe), then confirm the real depth from
  # the gunicorn access-log xff="…" field and bump to match. See webapp/run.py.
  proxyFixForwardedHops: 1
  # Kubernetes probes. Endpoints from src/webapp/api/v1/health.py:
  #   /live  -> process up, no DB call          (liveness + startup)
  #   /ready -> DB-gated, 200 healthy / 503 not  (readiness: gates rollout
  #             completion AND Service membership)
  # Liveness uses /live (no DB) so a transient DB blip can't trigger a
  # restart storm; readiness uses /ready so a DB outage pulls the pod from
  # the Service without killing it.
  probes:
    enabled: true
    path: /api/v1/health                 # base; /live and /ready appended
    startup:
      periodSeconds: 5
      failureThreshold: 30               # ~150s budget for gunicorn (33 workers) to boot
    liveness:
      periodSeconds: 15
      timeoutSeconds: 3
      failureThreshold: 3
    readiness:
      periodSeconds: 10
      timeoutSeconds: 5                  # readiness pings the DBs
      failureThreshold: 3
  # Pod/container security hardening. runAsUser MUST match the UID created in
  # containers/webapp/Dockerfile's production stage (USER 1000); runAsNonRoot
  # makes the kubelet enforce non-root even if a future image rebuild loses
  # the USER directive. readOnlyRootFilesystem deliberately deferred —
  # matplotlib's /tmp/mpl cache, gunicorn temp files, and the /var/log/sam
  # audit log all write the container layer.
  securityContext:
    pod:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    container:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
  container:                              # full image path
    image: ghcr.io/benkirk/sam-queries/webapp:main
    port: 5050                            # Port your container listens on
    requests:
      memory: 4096M                       # Guaranteed memory allocation
      cpu: 4                              # Guaranteed CPU allocation
    limits:
      memory: 12G                         # Maximum memory allowed
      cpu: 16                             # Maximum CPU allowed
  env:
    DISABLE_AUTH: "0"                     # Explicitly disabled — must remain 0 in production
    FLASK_ADMIN_ENABLED: "0"              # Flask-Admin /database browser stays unmounted on the public deploy
    FLASK_DEBUG: "0"
    FLASK_CONFIG: "production"            # Selects ProductionConfig (DEBUG=False, SESSION_COOKIE_SECURE=True)
    AUDIT_ENABLED: "1"
    AUDIT_LOG_PATH: "/var/log/sam/model_audit.log"
    # Mirror audit entries to STDOUT — the durable sink (CIRRUS retains
    # container STDOUT for 45d; the log file is on ephemeral pod storage).
    AUDIT_LOG_STDOUT: "1"
    JUPYTERHUB_API_URL: "https://jupyterhub.hpc.ucar.edu"
    JUPYTERHUB_INSTANCE: "stable"
    JUPYTERHUB_CACHE_TTL: "300"
    SAM_DB_SERVER: "sam-sql.ucar.edu"
    SAM_DB_REQUIRE_SSL: "true"
    STATUS_DB_DRIVER: "postgresql"
    STATUS_DB_SERVER: "csg-postgres.k8s.ucar.edu"
    # STATUS_DB_POOL_* defaults (size=2, overflow=4, recycle=600) live in
    # webapp/run.py and are already sized for csg-postgres' 100-slot cap.
    # Override here only if a future deployment uses a different backing
    # database (e.g. dedicated postgres with more headroom).
    GOOGLE_CALENDAR_EMBED_URL: "https://calendar.google.com/calendar/embed?src=ucar.edu_o09r1n89tid1b8jkrvurc8qio4%40group.calendar.google.com&ctz=America%2FDenver"
    # OIDC SSO via Microsoft Entra. Client ID/secret/issuer and FLASK_SECRET_KEY
    # are injected via secretKeyRef from the oidcCredentials ExternalSecret below.
    AUTH_PROVIDER: "oidc"
    OIDC_REDIRECT_URI: "https://samuel.k8s.ucar.edu/auth/oidc/callback"
    OIDC_USERNAME_CLAIM: "preferred_username"
    OIDC_SCOPES: "openid email profile"
    # API keys for HPC status collectors (bcrypt hashes — safe to store here).
    # Generate with: python scripts/gen_api_key.py --username collector
    API_KEYS_COLLECTOR: "$2b$12$X8NQvOUvyrj80Ud3N6Y.0uZs70ZC6lJYy/zfka/v7uQQFKJhds0b2"
    # hpc-usage-queries plugin (per-job drill-down on resource-usage pages).
    # The plugin reads JOB_HISTORY_PG_* at engine-creation time;
    # JOB_HISTORY_PG_USER / JOB_HISTORY_PG_PASSWORD are injected below
    # from the jhDbCredentials ExternalSecret.
    JOB_HISTORY_DB_BACKEND: "postgres"
    JOB_HISTORY_PG_HOST: "csg-postgres.k8s.ucar.edu"
    JOB_HISTORY_PG_PORT: "5432"
    JOB_HISTORY_MACHINES: "derecho,casper"
    # disable creating projects until ID system transition & GID pool
    CREATE_PROJECTS_ENABLED: "0"

  # system_status DB credentials (injected as STATUS_DB_USERNAME / STATUS_DB_PASSWORD).
  # MUST be a non-superuser role — connecting as the postgres SUPERUSER causes
  # SAM's idle pool to consume the cluster's superuser_reserved_connections
  # quota, which then locks out other pguser-class consumers with FATAL
  # "remaining connection slots are reserved for roles with the SUPERUSER
  # attribute". Reuses csg/pg-appuser (the same pguser role used by the
  # hpc-usage-queries plugin). Required grants on system_status DB:
  #   GRANT CONNECT ON DATABASE system_status TO pguser;
  #   GRANT USAGE ON SCHEMA public TO pguser;
  #   GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO pguser;
  #   GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO pguser;
  #   ALTER DEFAULT PRIVILEGES IN SCHEMA public
  #     GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO pguser;
  #   ALTER DEFAULT PRIVILEGES IN SCHEMA public
  #     GRANT USAGE, SELECT ON SEQUENCES TO pguser;
  dbCredentials:
    enabled: true                         # Enable syncing credentials from OpenBao
    useExternalSecret: true               # Create ExternalSecret CRD (set false to inject secrets manually)
    secretStoreRefName: csg-ro            # Name of the SecretStore to use
    secretPath: csg/pg-appuser            # pguser role (NOT csg/pg-superuser — see comment above)
    usernameKey: username                 # Key in OpenBao for username
    passwordKey: password                 # Key in OpenBao for password

  samDbCredentials:
    enabled: true                         # Enable syncing SAM DB credentials from OpenBao
    useExternalSecret: true               # Create ExternalSecret CRD (set false to inject secrets manually)
    secretStoreRefName: csg-ro            # Name of the SecretStore to use
    secretPath: csg/sam-readuser          # Path in OpenBao where SAM DB credentials are stored
    usernameKey: username                 # Key in OpenBao for username
    passwordKey: password                 # Key in OpenBao for password

  # hpc-usage-queries plugin's per-machine job_history Postgres
  # (derecho_jobs / casper_jobs on csg-postgres.k8s.ucar.edu).
  # Read-only application user — distinct from dbCredentials' pg-superuser
  # since the plugin only needs SELECT on the job_history tables.
  jhDbCredentials:
    enabled: true                         # Enable syncing credentials from OpenBao
    useExternalSecret: true               # Create ExternalSecret CRD (set false to inject secrets manually)
    secretStoreRefName: csg-ro            # Name of the SecretStore to use
    secretPath: csg/pg-appuser            # Path in OpenBao where credentials are stored
    usernameKey: username                 # Key in OpenBao for username
    passwordKey: password                 # Key in OpenBao for password

  jupyterhubCredentials:
    enabled: true                         # Enable syncing JupyterHub credentials from OpenBao
    useExternalSecret: true               # Create ExternalSecret CRD (set false to inject secrets manually)
    secretStoreRefName: csg-ro            # Name of the SecretStore to use
    secretPath: csg/jh-api-token          # Path in OpenBao where JupyterHub credentials are stored
    tokenKey: token                       # Key in OpenBao for the token

  # OIDC SSO credentials + Flask session-signing key.
  # secretPath convention: csg/sam-{env}-oidc when multiple environments coexist.
  # csg/sam-oidc is shorthand for the production-equivalent (samuel.k8s.ucar.edu) deployment.
  # Future staging k8s deployment should override secretPath: csg/sam-staging-oidc in values-staging.yaml.
  oidcCredentials:
    enabled: true                         # Enable syncing OIDC credentials from OpenBao
    useExternalSecret: true               # Create ExternalSecret CRD (set false to inject secrets manually)
    secretStoreRefName: csg-ro            # Name of the SecretStore to use
    secretPath: csg/sam-oidc              # Path in OpenBao for OIDC client + Flask session key
    clientIdKey: client_id                # OIDC client ID (Microsoft Entra app registration)
    clientSecretKey: client_secret        # OIDC client secret
    issuerKey: issuer                     # OIDC issuer URL (e.g. https://login.microsoftonline.com/{tenant}/v2.0)
    flaskSecretKeyKey: flask_secret_key   # Per-environment Flask session signing key (32-byte hex)
