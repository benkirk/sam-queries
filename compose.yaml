services:

  #---------------------------------------------
  # Webapp container: Production Web Application
  webapp:
    container_name: samuel-webapp
    build:
      context: .
      dockerfile: containers/webapp/Dockerfile
      target: production
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "7050:5050"
    networks:
      - sam-network
    volumes:
      - ./logs/prod:/var/log/sam
    environment:
      - DISABLE_AUTH=0         # Explicitly disabled — must remain 0 in production
      - FLASK_DEBUG=0
      - AUDIT_ENABLED=1
      - AUDIT_LOG_PATH=/var/log/sam/model_audit.log
      - JUPYTERHUB_API_URL=https://jupyterhub.hpc.ucar.edu
      - JUPYTERHUB_INSTANCE=stable
      - JUPYTERHUB_API_TOKEN=${JUPYTERHUB_API_TOKEN:-}
      - JUPYTERHUB_CACHE_TTL=300
      - STATUS_DB_DRIVER=${STATUS_DB_DRIVER:-mysql}
      - STATUS_DB_SERVER=${STATUS_DB_SERVER:-mysql}
      - STATUS_DB_USERNAME=${STATUS_DB_USERNAME:-root}
      - STATUS_DB_PASSWORD=${STATUS_DB_PASSWORD:-root}
      - GOOGLE_CALENDAR_EMBED_URL=${GOOGLE_CALENDAR_EMBED_URL:-'https://calendar.google.com/calendar/embed?src=ucar.edu_o09r1n89tid1b8jkrvurc8qio4%40group.calendar.google.com&ctz=America%2FDenver'}

    healthcheck:
      test: |
        python -c "import sam; import sys; sys.exit(0)"
        sam-search user csgteam
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  #----------------------------------------------
  # Webdev container: Development Web Application
  webdev:
    container_name: samuel-webdev
    build:
      context: .
      dockerfile: containers/webapp/Dockerfile
      target: development
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "5050:5050"
    networks:
      - sam-network
    volumes:
      - ./logs/dev:/var/log/sam
    # Development: Disable Python bytecode caching to avoid stale .pyc issues
    # when adding new files/functions. Remove for production deployment.
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - FLASK_DEBUG=1
      - AUDIT_ENABLED=1
      - AUDIT_LOG_PATH=/var/log/sam/model_audit.log
      - JUPYTERHUB_API_URL=https://jupyterhub.hpc.ucar.edu
      - JUPYTERHUB_INSTANCE=stable
      - JUPYTERHUB_API_TOKEN=${JUPYTERHUB_API_TOKEN:-}
      - JUPYTERHUB_CACHE_TTL=300
      - STATUS_DB_DRIVER=${STATUS_DB_DRIVER:-mysql}
      - STATUS_DB_SERVER=${STATUS_DB_SERVER:-mysql}
      - STATUS_DB_USERNAME=${STATUS_DB_USERNAME:-root}
      - STATUS_DB_PASSWORD=${STATUS_DB_PASSWORD:-root}
      - GOOGLE_CALENDAR_EMBED_URL=${GOOGLE_CALENDAR_EMBED_URL:-'https://calendar.google.com/calendar/embed?src=ucar.edu_o09r1n89tid1b8jkrvurc8qio4%40group.calendar.google.com&ctz=America%2FDenver'}

    # Important: watch the current directory, re-syncing as needed based on source changes
    develop:
      watch:
        - action: sync
          path: .
          target: /code
          ignore:
            - containers/
            - logs/
            - collectors/logs/
            - __pycache__/
            - "*.pyc"
            - .git/
            - "*~"
    healthcheck:
      test: |
        python -c "import sam; import sys; sys.exit(0)"
        sam-search user csgteam
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  #------------------------------------
  # MySQL container:
  mysql:
    container_name: samuel-mysql
    build:
      context: containers/sam-sql-dev
      dockerfile: Dockerfile
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sam
    volumes:
      - samuel-mysql-data:/var/lib/mysql
      - ./containers/sam-sql-dev/backups/sam-obfuscated.sql.xz:/backup.sql.xz:ro
    healthcheck:
      # Verify MySQL is up AND the sam database is queryable.
      # This prevents the webapp from starting before the restore completes.
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -proot && mysql -h localhost -u root -proot sam -e 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    ports:
      - "3306:3306"
    networks:
      - sam-network

  #------------------------------------
  # MySQL test container — isolated test database for new_tests/
  #
  # Identical image and obfuscated backup as the main mysql service, but:
  #   - Host port 3307 (not 3306) to prevent collisions with the dev stack
  #   - Separate named volume so data never mingles with dev MySQL
  #   - Gated behind `profiles: [test]` so `docker compose up` without a
  #     profile does NOT start this service (it's only for pytest runs)
  #
  # To start it:   docker compose --profile test up -d mysql-test
  # To stop it:    docker compose --profile test down
  #
  # new_tests/conftest.py enforces a hard allowlist that tests will ONLY
  # run against this container (host 127.0.0.1, port 3307). See
  # docs/plans/REFACTOR_TESTING.md for the full isolation design.
  mysql-test:
    container_name: samuel-mysql-test
    profiles: [test]
    build:
      context: containers/sam-sql-dev
      dockerfile: Dockerfile
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sam
    volumes:
      - samuel-mysql-test-data:/var/lib/mysql
      - ./containers/sam-sql-dev/backups/sam-obfuscated.sql.xz:/backup.sql.xz:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -proot && mysql -h localhost -u root -proot sam -e 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    ports:
      - "3307:3306"
    networks:
      - sam-network

networks:
  sam-network:
    driver: bridge

volumes:
  samuel-mysql-data:
  samuel-mysql-test-data:
