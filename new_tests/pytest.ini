# new_tests/pytest.ini — isolated from the root tests/ suite during migration.
#
# Invoke with:  pytest -c new_tests/pytest.ini new_tests/
#
# The `-c` flag is what keeps this config from inheriting the root
# pytest.ini's `testpaths = tests/` and the root conftest.py setup path.

[pytest]
testpaths = new_tests
addopts =
    -v
    --strict-markers
    --tb=short
    -n auto
    --no-cov
markers =
    smoke: fast infrastructure smoke tests
    unit: factory-driven unit tests, no snapshot dependency
    integration: snapshot-dependent structural tests
    webapp: Flask test-client routing tests
    perf: query-count / latency regression tests (slow, gated)
