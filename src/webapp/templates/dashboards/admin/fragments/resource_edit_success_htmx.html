{# htmx: Resource edit success response — closes modal and refreshes the Resources card #}
<div class="modal-body text-center py-4">
    <i class="fas fa-check-circle text-success fa-2x"></i>
    <p class="mt-2 text-success">Saved successfully.</p>
</div>
<script>
(function() {
    // Close whichever modal is currently open
    document.querySelectorAll('.modal.show').forEach(function(el) {
        var modal = bootstrap.Modal.getInstance(el);
        if (modal) modal.hide();
    });
    // Refresh the resources card body (preserving active_only state)
    setTimeout(function() {
        var cb = document.getElementById('resourcesCardActiveOnly');
        var url = '{{ url_for("admin_dashboard.htmx_resources_card") }}';
        if (cb && cb.checked) url += '?active_only=1';
        htmx.ajax('GET', url, {target: '#resourcesSection', swap: 'innerHTML'});
    }, 300);
})();
</script>
