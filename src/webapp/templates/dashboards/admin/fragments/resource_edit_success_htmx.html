{# htmx: Resource edit success response — closes modal and refreshes the Resources card #}
<div class="modal-body text-center py-4">
    <i class="fas fa-check-circle text-success fa-2x"></i>
    <p class="mt-2 text-success">Saved successfully.</p>
</div>
<script>
(function() {
    // Close whichever resource modal is open
    ['editResourceModal', 'editResourceTypeModal', 'editMachineModal', 'editQueueModal'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el) {
            var modal = bootstrap.Modal.getInstance(el);
            if (modal) modal.hide();
        }
    });
    // Refresh the resources card body
    setTimeout(function() {
        htmx.ajax('GET', '{{ url_for("admin_dashboard.htmx_resources_card") }}', {
            target: '#resourcesSection',
            swap: 'innerHTML'
        });
    }, 300);
})();
</script>
