{# htmx: Create NSF Program Form #}
<form hx-post="{{ url_for('admin_dashboard.htmx_nsf_program_create') }}"
      hx-target="#createNsfProgramFormContainer"
      hx-swap="innerHTML"
      hx-disabled-elt="find button[type='submit']">

    <div class="modal-body">
        <div class="mb-3">
            <label for="createNsfProgramName" class="form-label">
                Program Name <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control" id="createNsfProgramName"
                   name="nsf_program_name" required maxlength="255"
                   value="{{ form.get('nsf_program_name') if form else '' }}"
                   placeholder="e.g. Atmospheric and Geospace Sciences">
        </div>

        {% if errors %}
        <div class="alert alert-danger mt-2 mb-0">
            {% for error in errors %}
            <p class="mb-0"><i class="fas fa-exclamation-circle"></i> {{ error }}</p>
            {% endfor %}
        </div>
        {% endif %}
    </div>

    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-success">
            <i class="fas fa-plus"></i> Create NSF Program
        </button>
    </div>
</form>
