{#
  Admin: Facility Management Modals
  These containers live in the page DOM so HTMX can load edit forms into them
  when the edit buttons in the Facility card are clicked.
#}

<!-- Edit Facility Modal -->
<div class="modal fade" id="editFacilityModal" tabindex="-1"
     aria-labelledby="editFacilityModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-warning">
                <h5 class="modal-title" id="editFacilityModalLabel">
                    <i class="fas fa-building"></i> Edit Facility
                </h5>
                <button type="button" class="btn-close"
                        data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div id="editFacilityFormContainer">
                <div class="modal-body text-center text-muted py-4">
                    <i class="fas fa-spinner fa-spin fa-2x"></i>
                    <p class="mt-2">Loading...</p>
                </div>
            </div>
        </div>
    </div>
</div>
