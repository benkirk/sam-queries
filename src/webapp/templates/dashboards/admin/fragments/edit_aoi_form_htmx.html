{#
  htmx: Edit Area of Interest Form (loaded into #editAoiFormContainer)
  Editable: area_of_interest (required), group (dropdown, required), active.
#}

<form hx-post="{{ url_for('admin_dashboard.htmx_aoi_edit', aoi_id=aoi.area_of_interest_id) }}"
      hx-target="#editAoiFormContainer"
      hx-swap="innerHTML"
      hx-disabled-elt="find button[type='submit']">

    <div class="modal-body">
        <!-- ID (read-only) -->
        <div class="mb-3">
            <label class="form-label">AOI ID</label>
            <div class="form-control-plaintext text-muted">{{ aoi.area_of_interest_id }}</div>
        </div>

        <!-- Name -->
        <div class="mb-3">
            <label for="editAoiName" class="form-label">
                Name <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control" id="editAoiName"
                   name="area_of_interest" required maxlength="255"
                   value="{{ form.get('area_of_interest') if form else aoi.area_of_interest }}">
        </div>

        <!-- Group (dropdown) -->
        <div class="mb-3">
            <label for="editAoiGroup" class="form-label">
                Group <span class="text-danger">*</span>
            </label>
            <select class="form-select" id="editAoiGroup" name="area_of_interest_group_id" required>
                {% set selected_group_id = (form.get('area_of_interest_group_id')|int if form else aoi.area_of_interest_group_id) %}
                {% for g in aoi_groups %}
                <option value="{{ g.area_of_interest_group_id }}"
                        {% if g.area_of_interest_group_id == selected_group_id %}selected{% endif %}>
                    {{ g.name }}
                </option>
                {% endfor %}
            </select>
        </div>

        <!-- Active -->
        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="editAoiActive"
                   name="active" value="1"
                   {% if form %}{% if form.get('active') %}checked{% endif %}
                   {% elif aoi.active %}checked{% endif %}>
            <label class="form-check-label" for="editAoiActive">Active</label>
        </div>

        {% if errors %}
        <div class="alert alert-danger mt-2 mb-0">
            {% for error in errors %}
            <p class="mb-0"><i class="fas fa-exclamation-circle"></i> {{ error }}</p>
            {% endfor %}
        </div>
        {% endif %}
    </div>

    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-warning">
            <i class="fas fa-save"></i> Save Changes
        </button>
    </div>
</form>
