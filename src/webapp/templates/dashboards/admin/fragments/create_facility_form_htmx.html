{# htmx: Create Facility Form #}
<form hx-post="{{ url_for('admin_dashboard.htmx_facility_create') }}"
      hx-target="#createFacilityFormContainer"
      hx-swap="innerHTML"
      hx-disabled-elt="find button[type='submit']">

    <div class="modal-body">
        <div class="row">
            <div class="col-md-9">
                <div class="mb-3">
                    <label for="createFacilityName" class="form-label">
                        Facility Name <span class="text-danger">*</span>
                    </label>
                    <input type="text" class="form-control" id="createFacilityName"
                           name="facility_name" required maxlength="30"
                           value="{{ form.get('facility_name') if form else '' }}"
                           placeholder="e.g. UNIV">
                </div>
            </div>
            <div class="col-md-3">
                <div class="mb-3">
                    <label for="createFacilityCode" class="form-label">
                        Code <span class="text-muted">(1 char, optional)</span>
                    </label>
                    <input type="text" class="form-control" id="createFacilityCode"
                           name="code" maxlength="1"
                           value="{{ form.get('code') if form else '' }}"
                           placeholder="e.g. U">
                </div>
            </div>
        </div>

        <div class="mb-3">
            <label for="createFacilityDescription" class="form-label">
                Description <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control" id="createFacilityDescription"
                   name="description" required maxlength="255"
                   value="{{ form.get('description') if form else '' }}"
                   placeholder="e.g. University Allocations">
        </div>

        <div class="mb-3">
            <label for="createFacilityFairShare" class="form-label">
                Fair Share % <span class="text-muted">(optional, 0–100)</span>
            </label>
            <input type="number" class="form-control" id="createFacilityFairShare"
                   name="fair_share_percentage" min="0" max="100" step="0.01"
                   value="{{ form.get('fair_share_percentage') if form else '' }}"
                   placeholder="e.g. 25.0">
        </div>

        {% if errors %}
        <div class="alert alert-danger mt-2 mb-0">
            {% for error in errors %}
            <p class="mb-0"><i class="fas fa-exclamation-circle"></i> {{ error }}</p>
            {% endfor %}
        </div>
        {% endif %}
    </div>

    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-success">
            <i class="fas fa-plus"></i> Create Facility
        </button>
    </div>
</form>
