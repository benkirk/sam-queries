{# htmx: User search results for impersonation #}
{% if users %}
{% for user in users %}
<a href="#" class="list-group-item list-group-item-action"
   onclick="selectUserImpersonate('{{ user.username }}', '{{ user.display_name|e }}', '{{ user.primary_email or '' }}'); return false;">
    <strong>{{ user.display_name }}</strong>
    <small class="text-muted">({{ user.username }})</small>
    {% if user.primary_email %}
    <br><small class="text-muted">{{ user.primary_email }}</small>
    {% endif %}
</a>
{% endfor %}
{% else %}
<div class="list-group-item text-muted">No users found</div>
{% endif %}
