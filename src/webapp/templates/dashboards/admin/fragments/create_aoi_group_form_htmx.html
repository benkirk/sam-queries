{% from 'dashboards/fragments/modal_form.html' import htmx_form %}
{# htmx: Create AOI Group Form #}
{% call htmx_form(
    url_for('admin_dashboard.htmx_aoi_group_create'),
    '#createAoiGroupFormContainer',
    'Create AOI Group',
    submit_icon='plus'
) %}
        <div class="mb-3">
            <label for="createAoiGroupName" class="form-label">
                Name <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control" id="createAoiGroupName"
                   name="name" required maxlength="100"
                   value="{{ form.get('name') if form else '' }}"
                   placeholder="e.g. Physical Sciences">
        </div>
{% endcall %}
