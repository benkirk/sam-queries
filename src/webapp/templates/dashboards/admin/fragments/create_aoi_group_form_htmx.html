{# htmx: Create AOI Group Form #}
<form hx-post="{{ url_for('admin_dashboard.htmx_aoi_group_create') }}"
      hx-target="#createAoiGroupFormContainer"
      hx-swap="innerHTML"
      hx-disabled-elt="find button[type='submit']">

    <div class="modal-body">
        <div class="mb-3">
            <label for="createAoiGroupName" class="form-label">
                Name <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control" id="createAoiGroupName"
                   name="name" required maxlength="100"
                   value="{{ form.get('name') if form else '' }}"
                   placeholder="e.g. Physical Sciences">
        </div>

        {% if errors %}
        <div class="alert alert-danger mt-2 mb-0">
            {% for error in errors %}
            <p class="mb-0"><i class="fas fa-exclamation-circle"></i> {{ error }}</p>
            {% endfor %}
        </div>
        {% endif %}
    </div>

    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-success">
            <i class="fas fa-plus"></i> Create AOI Group
        </button>
    </div>
</form>
