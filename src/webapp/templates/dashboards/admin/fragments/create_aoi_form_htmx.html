{# htmx: Create Area of Interest Form #}
<form hx-post="{{ url_for('admin_dashboard.htmx_aoi_create') }}"
      hx-target="#createAoiFormContainer"
      hx-swap="innerHTML"
      hx-disabled-elt="find button[type='submit']">

    <div class="modal-body">
        <div class="mb-3">
            <label for="createAoiName" class="form-label">
                Name <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control" id="createAoiName"
                   name="area_of_interest" required maxlength="255"
                   value="{{ form.get('area_of_interest') if form else '' }}"
                   placeholder="e.g. Atmospheric Chemistry">
        </div>

        <div class="mb-3">
            <label for="createAoiGroup" class="form-label">
                Group <span class="text-danger">*</span>
            </label>
            <select class="form-select" id="createAoiGroup" name="area_of_interest_group_id" required>
                <option value="">— Select a group —</option>
                {% for group in aoi_groups %}
                <option value="{{ group.area_of_interest_group_id }}"
                    {% if form and form.get('area_of_interest_group_id') == group.area_of_interest_group_id|string %}selected{% endif %}>
                    {{ group.name }}
                </option>
                {% endfor %}
            </select>
        </div>

        {% if errors %}
        <div class="alert alert-danger mt-2 mb-0">
            {% for error in errors %}
            <p class="mb-0"><i class="fas fa-exclamation-circle"></i> {{ error }}</p>
            {% endfor %}
        </div>
        {% endif %}
    </div>

    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-success">
            <i class="fas fa-plus"></i> Create Area of Interest
        </button>
    </div>
</form>
