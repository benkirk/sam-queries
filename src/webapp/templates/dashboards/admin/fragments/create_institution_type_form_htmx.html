{% from 'dashboards/fragments/modal_form.html' import htmx_form %}
{# htmx: Create Institution Type Form #}
{% call htmx_form(
    url_for('admin_dashboard.htmx_institution_type_create'),
    '#createInstitutionTypeFormContainer',
    'Create Institution Type',
    submit_icon='plus'
) %}
        <div class="mb-3">
            <label for="createInstTypeName" class="form-label">
                Type Name <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control" id="createInstTypeName"
                   name="type" required maxlength="45"
                   value="{{ form.get('type') if form else '' }}"
                   placeholder="e.g. University">
        </div>
{% endcall %}
