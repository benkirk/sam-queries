{# htmx: Create Institution Type Form #}
<form hx-post="{{ url_for('admin_dashboard.htmx_institution_type_create') }}"
      hx-target="#createInstitutionTypeFormContainer"
      hx-swap="innerHTML"
      hx-disabled-elt="find button[type='submit']">

    <div class="modal-body">
        <div class="mb-3">
            <label for="createInstTypeName" class="form-label">
                Type Name <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control" id="createInstTypeName"
                   name="type" required maxlength="45"
                   value="{{ form.get('type') if form else '' }}"
                   placeholder="e.g. University">
        </div>

        {% if errors %}
        <div class="alert alert-danger mt-2 mb-0">
            {% for error in errors %}
            <p class="mb-0"><i class="fas fa-exclamation-circle"></i> {{ error }}</p>
            {% endfor %}
        </div>
        {% endif %}
    </div>

    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-success">
            <i class="fas fa-plus"></i> Create Institution Type
        </button>
    </div>
</form>
