{% from 'dashboards/fragments/modal_form.html' import htmx_form %}
{# htmx: Create Resource Type Form #}
{% call htmx_form(
    url_for('admin_dashboard.htmx_resource_type_create'),
    '#createResourceTypeFormContainer',
    'Create Resource Type',
    submit_icon='plus'
) %}
        <div class="mb-3">
            <label for="createResTypeName" class="form-label">
                Type Name <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control" id="createResTypeName"
                   name="resource_type" required maxlength="35"
                   value="{{ form.get('resource_type') if form else '' }}"
                   placeholder="e.g. HPC">
        </div>

        <div class="mb-3">
            <label for="createResTypeGrace" class="form-label">
                Grace Period Days <span class="text-muted">(optional)</span>
            </label>
            <input type="number" class="form-control" id="createResTypeGrace"
                   name="grace_period_days" min="0"
                   value="{{ form.get('grace_period_days') if form else '' }}"
                   placeholder="0">
        </div>
{% endcall %}
