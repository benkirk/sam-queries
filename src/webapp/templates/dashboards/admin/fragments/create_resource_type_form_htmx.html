{# htmx: Create Resource Type Form #}
<form hx-post="{{ url_for('admin_dashboard.htmx_resource_type_create') }}"
      hx-target="#createResourceTypeFormContainer"
      hx-swap="innerHTML"
      hx-disabled-elt="find button[type='submit']">

    <div class="modal-body">
        <div class="mb-3">
            <label for="createResTypeName" class="form-label">
                Type Name <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control" id="createResTypeName"
                   name="resource_type" required maxlength="35"
                   value="{{ form.get('resource_type') if form else '' }}"
                   placeholder="e.g. HPC">
        </div>

        <div class="mb-3">
            <label for="createResTypeGrace" class="form-label">
                Grace Period Days <span class="text-muted">(optional)</span>
            </label>
            <input type="number" class="form-control" id="createResTypeGrace"
                   name="grace_period_days" min="0"
                   value="{{ form.get('grace_period_days') if form else '' }}"
                   placeholder="0">
        </div>

        {% if errors %}
        <div class="alert alert-danger mt-2 mb-0">
            {% for error in errors %}
            <p class="mb-0"><i class="fas fa-exclamation-circle"></i> {{ error }}</p>
            {% endfor %}
        </div>
        {% endif %}
    </div>

    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-success">
            <i class="fas fa-plus"></i> Create Resource Type
        </button>
    </div>
</form>
