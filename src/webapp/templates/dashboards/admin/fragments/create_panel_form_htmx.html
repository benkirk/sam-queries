{% from 'dashboards/fragments/modal_form.html' import htmx_form %}
{# htmx: Create Panel Form #}
{% call htmx_form(
    url_for('admin_dashboard.htmx_panel_create'),
    '#createPanelFormContainer',
    'Create Panel',
    submit_icon='plus'
) %}
        <div class="mb-3">
            <label for="createPanelName" class="form-label">
                Panel Name <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control" id="createPanelName"
                   name="panel_name" required maxlength="30"
                   value="{{ form.get('panel_name') if form else '' }}"
                   placeholder="e.g. UNIV-LARGE">
        </div>

        <div class="mb-3">
            <label for="createPanelFacility" class="form-label">
                Facility <span class="text-danger">*</span>
            </label>
            <select class="form-select" id="createPanelFacility" name="facility_id" required>
                <option value="">— Select facility —</option>
                {% for f in facilities %}
                <option value="{{ f.facility_id }}"
                    {% if form and form.get('facility_id') == f.facility_id|string %}selected{% endif %}>
                    {{ f.facility_name }}{% if f.code %} ({{ f.code }}){% endif %}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label for="createPanelDescription" class="form-label">
                Description <span class="text-muted">(optional)</span>
            </label>
            <input type="text" class="form-control" id="createPanelDescription"
                   name="description" maxlength="100"
                   value="{{ form.get('description') if form else '' }}">
        </div>
{% endcall %}
