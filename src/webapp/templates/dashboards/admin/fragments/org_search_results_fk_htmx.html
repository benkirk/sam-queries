{# htmx: Organization search results for FK picker fields (e.g. resource responsible org) #}
{% if orgs %}
{% for org in orgs %}
<div class="list-group-item list-group-item-action p-2 fk-search-result"
     style="cursor:pointer;"
     data-fk-id="{{ org.organization_id }}"
     data-fk-label="{{ org.name }} ({{ org.acronym }})"
     data-org-id="{{ org.organization_id }}"
     data-org-display="{{ org.name }} ({{ org.acronym }})">
    <span class="badge bg-light text-dark border me-1">{{ org.acronym }}</span>
    {{ org.name }}
</div>
{% endfor %}
{% else %}
<div class="list-group-item text-muted small py-2">No organizations found</div>
{% endif %}
