{#
  Admin: Resource Management Modals
  These containers live in the page DOM so HTMX can load edit forms into them
  when the edit buttons in the Resources card are clicked.
#}

<!-- Edit Resource Modal -->
<div class="modal fade" id="editResourceModal" tabindex="-1"
     aria-labelledby="editResourceModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-warning">
                <h5 class="modal-title" id="editResourceModalLabel">
                    <i class="fas fa-server"></i> Edit Resource
                </h5>
                <button type="button" class="btn-close"
                        data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div id="editResourceFormContainer">
                <div class="modal-body text-center text-muted py-4">
                    <i class="fas fa-spinner fa-spin fa-2x"></i>
                    <p class="mt-2">Loading...</p>
                </div>
            </div>
        </div>
    </div>
</div>
