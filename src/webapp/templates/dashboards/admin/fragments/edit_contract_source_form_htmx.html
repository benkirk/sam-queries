{#
  htmx: Edit Contract Source Form (loaded into #editContractSourceFormContainer)
  Editable: contract_source (required), active.
#}

<form hx-post="{{ url_for('admin_dashboard.htmx_contract_source_edit', source_id=source.contract_source_id) }}"
      hx-target="#editContractSourceFormContainer"
      hx-swap="innerHTML"
      hx-disabled-elt="find button[type='submit']">

    <div class="modal-body">
        <!-- ID (read-only) -->
        <div class="mb-3">
            <label class="form-label">Source ID</label>
            <div class="form-control-plaintext text-muted">{{ source.contract_source_id }}</div>
        </div>

        <!-- Name -->
        <div class="mb-3">
            <label for="editContractSourceName" class="form-label">
                Source Name <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control" id="editContractSourceName"
                   name="contract_source" required maxlength="50"
                   value="{{ form.get('contract_source') if form else source.contract_source }}">
        </div>

        <!-- Active -->
        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="editContractSourceActive"
                   name="active" value="1"
                   {% if form %}{% if form.get('active') %}checked{% endif %}
                   {% elif source.active %}checked{% endif %}>
            <label class="form-check-label" for="editContractSourceActive">Active</label>
        </div>

        {% if errors %}
        <div class="alert alert-danger mt-2 mb-0">
            {% for error in errors %}
            <p class="mb-0"><i class="fas fa-exclamation-circle"></i> {{ error }}</p>
            {% endfor %}
        </div>
        {% endif %}
    </div>

    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-warning">
            <i class="fas fa-save"></i> Save Changes
        </button>
    </div>
</form>
