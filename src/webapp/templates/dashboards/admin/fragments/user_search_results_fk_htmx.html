{# htmx: User search results for FK picker fields (e.g. contract PI, resource sysadmin) #}
{% if users %}
{% for user in users %}
<div class="list-group-item list-group-item-action p-2 fk-search-result"
     style="cursor:pointer;"
     data-fk-id="{{ user.user_id }}"
     data-fk-label="{{ user.display_name }} ({{ user.username }})">
    <div class="d-flex justify-content-between align-items-center">
        <div>
            <strong>{{ user.display_name }}</strong>
            <small class="ms-1 text-muted">({{ user.username }})</small>
        </div>
        {% if user.primary_email %}
        <small class="text-muted">{{ user.primary_email }}</small>
        {% endif %}
    </div>
</div>
{% endfor %}
{% else %}
<div class="list-group-item text-muted small py-2">No users found</div>
{% endif %}
