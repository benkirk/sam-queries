{#
  htmx: Edit NSF Program Form (loaded into #editNsfProgramFormContainer)
  Editable: nsf_program_name (required), active.
#}

<form hx-post="{{ url_for('admin_dashboard.htmx_nsf_program_edit', nsf_program_id=program.nsf_program_id) }}"
      hx-target="#editNsfProgramFormContainer"
      hx-swap="innerHTML"
      hx-disabled-elt="find button[type='submit']">

    <div class="modal-body">
        <!-- ID (read-only) -->
        <div class="mb-3">
            <label class="form-label">Program ID</label>
            <div class="form-control-plaintext text-muted">{{ program.nsf_program_id }}</div>
        </div>

        <!-- Name -->
        <div class="mb-3">
            <label for="editNsfProgramName" class="form-label">
                Program Name <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control" id="editNsfProgramName"
                   name="nsf_program_name" required maxlength="255"
                   value="{{ form.get('nsf_program_name') if form else program.nsf_program_name }}">
        </div>

        <!-- Active -->
        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="editNsfProgramActive"
                   name="active" value="1"
                   {% if form %}{% if form.get('active') %}checked{% endif %}
                   {% elif program.active %}checked{% endif %}>
            <label class="form-check-label" for="editNsfProgramActive">Active</label>
        </div>

        {% if errors %}
        <div class="alert alert-danger mt-2 mb-0">
            {% for error in errors %}
            <p class="mb-0"><i class="fas fa-exclamation-circle"></i> {{ error }}</p>
            {% endfor %}
        </div>
        {% endif %}
    </div>

    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-warning">
            <i class="fas fa-save"></i> Save Changes
        </button>
    </div>
</form>
