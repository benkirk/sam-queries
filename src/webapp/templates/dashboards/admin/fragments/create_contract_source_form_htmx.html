{# htmx: Create Contract Source Form #}
<form hx-post="{{ url_for('admin_dashboard.htmx_contract_source_create') }}"
      hx-target="#createContractSourceFormContainer"
      hx-swap="innerHTML"
      hx-disabled-elt="find button[type='submit']">

    <div class="modal-body">
        <div class="mb-3">
            <label for="createContractSourceName" class="form-label">
                Source Name <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control" id="createContractSourceName"
                   name="contract_source" required maxlength="50"
                   value="{{ form.get('contract_source') if form else '' }}"
                   placeholder="e.g. NSF">
        </div>

        {% if errors %}
        <div class="alert alert-danger mt-2 mb-0">
            {% for error in errors %}
            <p class="mb-0"><i class="fas fa-exclamation-circle"></i> {{ error }}</p>
            {% endfor %}
        </div>
        {% endif %}
    </div>

    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-success">
            <i class="fas fa-plus"></i> Create Contract Source
        </button>
    </div>
</form>
