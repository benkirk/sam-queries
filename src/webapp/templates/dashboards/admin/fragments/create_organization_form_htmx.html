{# htmx: Create Organization Form #}
<form hx-post="{{ url_for('admin_dashboard.htmx_organization_create') }}"
      hx-target="#createOrganizationFormContainer"
      hx-swap="innerHTML"
      hx-disabled-elt="find button[type='submit']">

    <div class="modal-body">
        <div class="mb-3">
            <label for="createOrgName" class="form-label">
                Name <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control" id="createOrgName"
                   name="name" required maxlength="100"
                   value="{{ form.get('name') if form else '' }}"
                   placeholder="e.g. Computational Science">
        </div>

        <div class="mb-3">
            <label for="createOrgAcronym" class="form-label">
                Acronym <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control" id="createOrgAcronym"
                   name="acronym" required maxlength="15"
                   value="{{ form.get('acronym') if form else '' }}"
                   placeholder="e.g. CSCI">
        </div>

        <div class="mb-3">
            <label for="createOrgDescription" class="form-label">
                Description <span class="text-muted">(optional)</span>
            </label>
            <input type="text" class="form-control" id="createOrgDescription"
                   name="description" maxlength="255"
                   value="{{ form.get('description') if form else '' }}">
        </div>

        <div class="mb-3">
            <label for="createOrgParent" class="form-label">
                Parent Organization <span class="text-muted">(optional)</span>
            </label>
            <select class="form-select" id="createOrgParent" name="parent_org_id">
                <option value="">— None (root level) —</option>
                {% for parent in parent_orgs %}
                <option value="{{ parent.organization_id }}"
                    {% if form and form.get('parent_org_id') == parent.organization_id|string %}selected{% endif %}>
                    {{ parent.acronym }} — {{ parent.name }}
                </option>
                {% endfor %}
            </select>
        </div>

        {% if errors %}
        <div class="alert alert-danger mt-2 mb-0">
            {% for error in errors %}
            <p class="mb-0"><i class="fas fa-exclamation-circle"></i> {{ error }}</p>
            {% endfor %}
        </div>
        {% endif %}
    </div>

    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-success">
            <i class="fas fa-plus"></i> Create Organization
        </button>
    </div>
</form>
