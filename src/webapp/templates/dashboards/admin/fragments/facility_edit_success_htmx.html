{# htmx: Facility edit success response — closes modal and refreshes the Facility card #}
<div class="modal-body text-center py-4">
    <i class="fas fa-check-circle text-success fa-2x"></i>
    <p class="mt-2 text-success">Saved successfully.</p>
</div>
<script>
(function() {
    // Close whichever facility modal is open
    ['editFacilityModal', 'editPanelModal', 'editPanelSessionModal', 'editAllocationTypeModal'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el) {
            var modal = bootstrap.Modal.getInstance(el);
            if (modal) modal.hide();
        }
    });
    // Refresh the facility card body (preserving active_only state)
    setTimeout(function() {
        var cb = document.getElementById('facilitiesCardActiveOnly');
        var url = '{{ url_for("admin_dashboard.htmx_facilities_card") }}';
        if (cb && cb.checked) url += '?active_only=1';
        htmx.ajax('GET', url, {target: '#facilitiesSection', swap: 'innerHTML'});
    }, 300);
})();
</script>
